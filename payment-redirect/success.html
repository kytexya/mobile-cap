<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán thành công</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 40px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { opacity: 0.9; margin-bottom: 2rem; }
    .loading {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: white;
      color: #667eea;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1>Thanh toán thành công!</h1>
    <p>Đang chuyển về ứng dụng KMS...</p>
    <div class="loading"></div>
    <br><br>
    <a id="openApp" href="#" class="btn">Mở ứng dụng</a>
  </div>

  <script>
    // Parse query parameters
    const params = new URLSearchParams(window.location.search);
    const queryString = params.toString();
    
    // Build deep link URL
    const deepLink = 'kmsmobile://payment/success' + (queryString ? '?' + queryString : '');
    
    // Auto redirect after 1.5 seconds
    setTimeout(() => {
      window.location.href = deepLink;
    }, 1500);
    
    // Update button href
    document.getElementById('openApp').href = deepLink;
    
    // Try immediate redirect as well
    window.location.href = deepLink;
  </script>
</body>
</html>
